---
agencyPlan:
  type: object
  properties:
    id:
      type: integer
      format: int64
      x-field-extra-annotation: '@com.baomidou.mybatisplus.annotation.TableId(type = com.baomidou.mybatisplus.annotation.IdType.AUTO)'
    name:
      type: string
    agencyId:
      type: integer
      format: int64
    agencyName:
      type: string
    cardAssociation:
      type: integer
      description: 1:visa 2:masterCard 3:AmericanExpress 4:JCB 5:unionPay
    platformId:
      type: integer
      format: int64
    platformName:
      type: string
    registrationMethod:
      type: integer
      description: 1:phone 2:email 3:username
    discount:
      type: number
      description: in percentage
    referralCode:
      type: string
    planStatus:
      type: integer
      description: 1:active 2:inactive
    createdAt:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time