---
transfer:
  type: object
  title: transfer
  properties:
    id:
      type: integer
      format: int64
      x-field-extra-annotation: '@com.baomidou.mybatisplus.annotation.TableId(type = com.baomidou.mybatisplus.annotation.IdType.AUTO)'
    cardOrderId:
      type: integer
      format: int64
    orderNumber:
      type: string
    redirectLink:
      type: string
    userId:
      type: integer
      format: int64
    cryptocurrency:
      type: string
    transferAmount:
      type: number
    receivedAmount:
      type: number
    direction:
      type: integer
      description: 1:deposit 2:withdraw
    transferStatus:
      type: integer
      description: 1:creating 2:pending 3:processing 4:completed 5:denied 6:overdue
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    confirmedAt:
      type: string
      format: date-time