        createdAtTo:
          type: string
          format: date-time
        updatedAtFrom:
          type: string
          format: date-time
        updatedAtTo:
          type: string
          format: date-time
        paymentDueAtFrom:
          type: string
          format: date-time
        paymentDueAtTo:
          type: string
          format: date-time
        ShippedAtFrom:
          type: string
          format: date-time
        ShippedAtTo:
          type: string
          format: date-time