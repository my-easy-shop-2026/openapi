openapi: 3.0.3
info:
  title: notify base
  description: This is my API
  version: 1.0.0
paths:
  /email/send:
    post:
      operationId: /email/send
      tags:
        - email
      requestBody:
        description: 寄信
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/emailSendRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSendResponse'
  /email/sendWithTemplate:
    post:
      operationId: /email/sendWithTemplate
      tags:
        - email
      requestBody:
        description: 樣板寄信
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/emailSendWithTemplateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSendWithTemplateResponse'
  /passageway:
    get:
      operationId: /passageway/get
      description: 取得頻道
      tags:
        - passageway
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/passageway'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/passagewayGetResponse'
  /sendRecord:
    post:
      operationId: /sendRecord/add
      description: 新增傳送紀錄
      tags:
        - sendRecord
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/sendRecord'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sendRecordAddResponse'
  '/sendRecord/{sendRecordId}':
    get:
      operationId: /sendRecord/getById
      description: 取得通知紀錄
      tags:
        - sendRecord
      parameters:
        - in: path
          name: sendRecordId
          description: send Record ID
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sendRecordGetByIdResponse'
  /template:
    post:
      operationId: /template/add
      description: 新增樣板
      tags:
        - template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/templateAddRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/templateAddResponse'
    get:
      operationId: /template/get
      description: 取得通知樣板
      tags:
        - template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/templateGetRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/templateGetResponse'
    patch:
      operationId: /template/update
      tags:
        - template
      requestBody:
        description: 寄信
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/templateUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/templateUpdateResponse'
  '/template/{templateId}':
    get:
      operationId: /template/getById
      description: 取得通知樣板
      tags:
        - template
      parameters:
        - in: path
          name: templateId
          description: template ID
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/templateGetByIdResponse'
  /message:
    post:
      operationId: /message/add
      description: 新增訊息
      tags:
        - message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/message'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/messageAddResponse'
  '/message/{messageId}':
    get:
      operationId: /message/getById
      description: 取得通知紀錄
      tags:
        - message
      parameters:
        - in: path
          name: messageId
          description: send Record ID
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/messageGetByIdResponse'
components:
  schemas:
    result:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        requestId:
          type: string
        success:
          type: boolean
    id:
      type: object
      properties:
        id:
          type: integer
          format: int64
    emailSendRequest:
      type: object
      title: emailSendRequest
      properties:
        title:
          type: string
        content:
          type: string
        sender:
          type: string
          format: email
        receiver:
          type: string
          format: email
      required:
        - title
        - content
        - sender
        - receiver
    emailSendResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              type: object
              properties:
                success:
                  type: boolean
                response:
                  type: string
                messageId:
                  type: integer
                  format: int64
                sendRecordId:
                  type: integer
                  format: int64
    emailSendWithTemplateRequest:
      type: object
      title: emailSendWithTemplateRequest
      properties:
        templateId:
          type: integer
          format: int64
        sender:
          type: string
          format: email
        receiver:
          type: string
          format: email
        additionalProperties:
          type: string
      required:
        - title
        - content
        - sender
        - receiver
    emailSendWithTemplateResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              type: object
              properties:
                success:
                  type: boolean
                response:
                  type: string
                messageId:
                  type: integer
                  format: int64
                sendRecordId:
                  type: integer
                  format: int64
    message:
      type: object
      properties:
        id:
          type: integer
          format: int64
          x-field-extra-annotation: '@com.baomidou.mybatisplus.annotation.TableId(type = com.baomidou.mybatisplus.annotation.IdType.AUTO)'
        notifyType:
          type: integer
        receiver:
          type: string
        subject:
          type: string
        content:
          type: string
        templateId:
          type: integer
        templateParameter:
          type: string
        status:
          type: integer
        count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    messageAddRequest:
      $ref: '#/components/schemas/message'
    messageAddResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/id'
    messageGetByIdRequest:
      type: object
      title: messageGetByIdRequest
      properties:
        title:
          type: string
        content:
          type: string
        sender:
          type: string
          format: email
        receiver:
          type: string
          format: email
      required:
        - title
        - content
        - sender
        - receiver
    messageGetByIdResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/message'
    sendRecord:
      type: object
      properties:
        id:
          type: integer
          format: int64
          x-field-extra-annotation: '@com.baomidou.mybatisplus.annotation.TableId(type = com.baomidou.mybatisplus.annotation.IdType.AUTO)'
        messageId:
          type: integer
          format: int64
        passagewayId:
          type: integer
          format: int64
        status:
          type: integer
        responseCode:
          type: integer
        responseContent:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    sendRecordAddRequest:
      $ref: '#/components/schemas/sendRecord'
    sendRecordAddResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/id'
    sendRecordGetByIdRequest:
      type: object
      title: sendRecordGetByIdRequest
      properties:
        title:
          type: string
        content:
          type: string
        sender:
          type: string
          format: email
        receiver:
          type: string
          format: email
      required:
        - title
        - content
        - sender
        - receiver
    sendRecordGetByIdResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/sendRecord'
    template:
      type: object
      properties:
        id:
          type: integer
          format: int64
          x-field-extra-annotation: '@com.baomidou.mybatisplus.annotation.TableId(type = com.baomidou.mybatisplus.annotation.IdType.AUTO)'
        name:
          type: string
        subject:
          type: string
        content:
          type: string
        notifyType:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    templateAddRequest:
      type: object
      title: templateAddRequest
      properties:
        title:
          type: string
        content:
          type: string
        sender:
          type: string
          format: email
        receiver:
          type: string
          format: email
      required:
        - title
        - content
        - sender
        - receiver
    templateAddResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              type: object
    templateGetByIdRequest:
      type: object
      title: templateGetByIdRequest
      properties:
        title:
          type: string
        content:
          type: string
        sender:
          type: string
          format: email
        receiver:
          type: string
          format: email
      required:
        - title
        - content
        - sender
        - receiver
    templateGetByIdResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/template'
    templateGetRequest:
      type: object
      title: templateGetRequest
      properties:
        title:
          type: string
        content:
          type: string
        sender:
          type: string
          format: email
        receiver:
          type: string
          format: email
      required:
        - title
        - content
        - sender
        - receiver
    templateGetResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/template'
    templateUpdateRequest:
      type: object
      title: templateUpdateRequest
      properties:
        title:
          type: string
        content:
          type: string
        sender:
          type: string
          format: email
        receiver:
          type: string
          format: email
      required:
        - title
        - content
        - sender
        - receiver
    templateUpdateResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              type: object
    passageway:
      type: object
      properties:
        id:
          type: integer
          format: int64
          x-field-extra-annotation: '@com.baomidou.mybatisplus.annotation.TableId(type = com.baomidou.mybatisplus.annotation.IdType.AUTO)'
        uuid:
          type: string
        notifyType:
          type: integer
        range:
          type: integer
        status:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    passagewayGetRequest:
      $ref: '#/components/schemas/passageway'
    passagewayGetResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/passageway'

