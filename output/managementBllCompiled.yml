openapi: 3.0.3
info:
  title: management bll
  description: This is my API
  version: 1.0.0
paths:
  /auth/login:
    post:
      operationId: /auth/login
      tags:
        - auth
      requestBody:
        description: 登入
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/authLoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authLoginResponse'
  /auth/logout:
    post:
      operationId: /auth/logout
      tags:
        - auth
      requestBody:
        description: 登出
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/authLogoutRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authLogoutResponse'
  /auth/captchaGet:
    post:
      operationId: /auth/captcha/get
      tags:
        - auth
      requestBody:
        description: 登入
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/authCaptchaGetRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authCaptchaGetResponse'
  /auth/sendVerificationCode:
    post:
      operationId: /auth/sendVerificationCode
      tags:
        - auth
      requestBody:
        description: 送出驗證碼
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/authSendVerificationCodeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authSendVerificationCodeResponse'
  /systemUserGet:
    post:
      operationId: /systemUser/get
      description: 取得系統用戶資料
      tags:
        - systemUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/systemUserQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/systemUserGetResponse'
  '/systemUser/{systemUserId}/resetPassword':
    patch:
      operationId: /systemUser/resetPassword
      description: 系統用戶重設密碼
      tags:
        - systemUser
      parameters:
        - in: path
          name: systemUserId
          description: system user ID
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: 系統用戶重設密碼
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/systemUserResetPasswordRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/systemUserResetPasswordResponse'
  /systemUser/infoGet:
    post:
      operationId: /systemUser/info/get
      description: 取得系統用戶本身資料
      tags:
        - systemUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/systemUserInfoGetRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/systemUserInfoGetResponse'
  /cardOrderGet:
    post:
      operationId: /order/get
      description: 取得卡片訂單
      tags:
        - order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cardOrderQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cardOrderGetResponse'
  /cardOrder/pageGet:
    post:
      operationId: /cardOrder/page/get
      description: 取得卡片訂單分頁
      tags:
        - cardOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cardOrderPageRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cardOrderPageResponse'
  '/cardOrder/{cardOrderId}/confirm':
    patch:
      operationId: /cardOrder/confirm
      description: 確認付款狀態
      tags:
        - cardOrder
      parameters:
        - in: path
          name: cardOrderId
          description: card order ID
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cardOrderConfirmRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cardOrderConfirmResponse'
  '/cardOrder/{cardOrderId}/ship':
    patch:
      operationId: /cardOrder/ship
      description: 發貨
      tags:
        - cardOrder
      parameters:
        - in: path
          name: cardOrderId
          description: card order ID
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cardOrderShipRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cardOrderShipResponse'
  '/cardOrder/{cardOrderId}/remark':
    patch:
      operationId: /cardOrder/remark
      description: 備註訂單
      tags:
        - cardOrder
      parameters:
        - in: path
          name: cardOrderId
          description: card order ID
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cardOrderRemarkRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cardOrderRemarkResponse'
  '/user/{userId}/resetEmail':
    patch:
      operationId: /user/resetEmail
      description: 用戶重設email
      tags:
        - user
      parameters:
        - in: path
          name: userId
          description: user ID
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: 用戶重設密碼
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/userResetEmailRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userResetEmailResponse'
  /user/pageGet:
    post:
      operationId: /user/page/get
      description: 取得用戶分頁
      tags:
        - user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/userPageRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userPageResponse'
  /userWithAgencyGet:
    post:
      operationId: /userWithAgency/get
      description: 同時取得用戶與代理
      tags:
        - userWithAgency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/userWithAgencyQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userWithAgencyGetResponse'
  /userWithAgency/pageGet:
    post:
      operationId: /userWithAgency/page/get
      description: 同時取得用戶與代理分頁
      tags:
        - userWithAgency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/userWithAgencyPageRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userWithAgencyPageResponse'
  /agency:
    post:
      operationId: /agency/add
      description: 新增代理
      tags:
        - agency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agency'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agencyAddResponse'
  /agencyGet:
    post:
      operationId: /agency/get
      description: 取得代理
      tags:
        - agency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agencyQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agencyGetResponse'
  '/agency/{agencyId}':
    patch:
      operationId: /agency/update
      description: 更新代理
      tags:
        - agency
      parameters:
        - in: path
          name: agencyId
          description: agency ID
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agencyUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agencyUpdateResponse'
  /agency/pageGet:
    post:
      operationId: /agency/page/get
      description: 取得代理分頁
      tags:
        - agency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agencyPageRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agencyPageResponse'
  '/agency/{agencyId}/activate':
    patch:
      operationId: /agency/activate
      description: 代理啟用
      tags:
        - agency
      parameters:
        - in: path
          name: agencyId
          description: agency ID
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agencyActivateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agencyActivateResponse'
  /agencyPlan:
    post:
      operationId: /agencyPlan/add
      description: 新增代理方案
      tags:
        - agencyPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agencyPlan'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agencyPlanAddResponse'
  /agencyPlanGet:
    post:
      operationId: /agencyPlan/get
      description: 取得代理方案
      tags:
        - agencyPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agencyPlanQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agencyPlanGetResponse'
  '/agencyPlan/{agencyPlanId}':
    patch:
      operationId: /agencyPlan/update
      description: 更新代理方案
      tags:
        - agencyPlan
      parameters:
        - in: path
          name: agencyPlanId
          description: agency plan ID
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agencyPlanUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agencyPlanUpdateResponse'
  /agencyPlan/referralCode/generateGet:
    post:
      operationId: /agencyPlan/referralCode/generate
      description: 取得隨機推薦碼
      tags:
        - agencyPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/referralCodeGenerateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/referralCodeGenerateResponse'
  /agencyWithPlan:
    post:
      operationId: /agencyWithPlan/add
      description: 新增代理同時新增方案
      tags:
        - agencyWithPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agencyWithPlan'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agencyWithPlanAddResponse'
  /agencyWithPlanGet:
    post:
      operationId: /agencyWithPlan/get
      description: 取得代理同時取得方案
      tags:
        - agencyWithPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agencyWithPlanQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agencyWithPlanGetResponse'
  /agencyWithPlan/pageGet:
    post:
      operationId: /agencyWithPlan/page/get
      description: 取得代理同時取得方案分頁
      tags:
        - agencyWithPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agencyWithPlanPageRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agencyWithPlanPageResponse'
  '/agencyWithPlan/{agencyPlanId}':
    patch:
      operationId: /agencyWithPlan/update
      description: 更新代理代理同時更新方案
      tags:
        - agencyWithPlan
      parameters:
        - in: path
          name: agencyPlanId
          description: agency plan ID
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agencyWithPlanUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agencyWithPlanUpdateResponse'
  /platformGet:
    post:
      operationId: /platform/get
      description: 取得平台
      tags:
        - platform
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/platform'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/platformGetResponse'
components:
  schemas:
    id:
      type: object
      properties:
        id:
          type: integer
          format: int64
    result:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        requestId:
          type: string
        success:
          type: boolean
    page:
      type: object
      properties:
        total:
          type: integer
          format: int64
        size:
          type: integer
          format: int64
        current:
          type: integer
          format: int64
        pages:
          type: integer
          format: int64
    user:
      type: object
      title: user
      properties:
        id:
          type: integer
          format: int64
          x-field-extra-annotation: '@com.baomidou.mybatisplus.annotation.TableId(type = com.baomidou.mybatisplus.annotation.IdType.AUTO)'
        email:
          type: string
          format: email
        countryCode:
          type: integer
        nationalPhoneNumber:
          type: string
        password:
          type: string
          format: password
        firstName:
          type: string
        lastName:
          type: string
        fullName:
          type: string
        fullNameWestern:
          type: string
        fullNameReverse:
          type: string
        fullNameWesternReverse:
          type: string
        nationCode:
          type: string
          description: '國籍編碼(ISO 3166-1) 中國:CHN 新加坡:SGP 台灣:TWN'
        gender:
          type: integer
        createdAt:
          type: string
          format: date-time
          description: 'format:2023-12-25T05:04:03+02:00'
        updatedAt:
          type: string
          format: date-time
          description: 'format:2023-12-25T05:04:03+02:00'
    userQuery:
      allOf:
        - $ref: '#/components/schemas/user'
        - type: object
          properties:
            createdAtFrom:
              type: string
              format: date-time
            createdAtTo:
              type: string
              format: date-time
            updatedAtFrom:
              type: string
              format: date-time
            updatedAtTo:
              type: string
              format: date-time
            idIn:
              type: array
              items:
                type: integer
                format: int64
    userResetEmailRequest:
      type: object
      title: userResetEmailRequest
      properties:
        email:
          type: string
          format: email
        emailVerificationCode:
          type: string
        executor:
          type: integer
          format: int64
    userResetEmailResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              type: object
    userPageRequest:
      allOf:
        - $ref: '#/components/schemas/userQuery'
        - type: object
          properties:
            pageCurrent:
              type: integer
            pageSize:
              type: integer
    userPageResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              allOf:
                - $ref: '#/components/schemas/page'
                - type: object
                  properties:
                    records:
                      type: array
                      items:
                        $ref: '#/components/schemas/user'
    userWithAgency:
      allOf:
        - $ref: '#/components/schemas/user'
        - type: object
          title: userAgency
          properties:
            id:
              type: integer
              format: int64
              x-field-extra-annotation: '@com.baomidou.mybatisplus.annotation.TableId(type = com.baomidou.mybatisplus.annotation.IdType.AUTO)'
            userId:
              type: integer
              format: int64
            agencyId:
              type: integer
              format: int64
            agencyName:
              type: string
            platformId:
              type: integer
              format: int64
            platformName:
              type: string
            platformRegistrationMethod:
              type: integer
              description: '1:phone 2:email 3:username'
            countryCodeFromPlatform:
              type: integer
              format: int32
            nationalPhoneNumberFromPlatform:
              type: string
            emailFromPlatform:
              type: string
              format: email
            userPlatformId:
              type: integer
              format: int64
              description: the relation between user and platform
            createdAt:
              type: string
              format: date-time
              description: 'format:2023-12-25T05:04:03+02:00'
            updatedAt:
              type: string
              format: date-time
              description: 'format:2023-12-25T05:04:03+02:00'
            deleted:
              type: integer
              description: '0:not delete 1:delete'
        - type: object
          title: userCardOrder
          properties:
            id:
              type: integer
              format: int64
              x-field-extra-annotation: '@com.baomidou.mybatisplus.annotation.TableId(type = com.baomidou.mybatisplus.annotation.IdType.AUTO)'
            userId:
              type: integer
              format: int64
            cardOrderId:
              type: integer
              format: int64
            orderNumber:
              type: string
            cardProductId:
              type: integer
              format: int64
            cardAssociation:
              type: integer
              description: '1:visa 2:masterCard 3:AmericanExpress 4:JCB 5:unionPay'
            agencyId:
              type: integer
              format: int64
            agencyPlanId:
              type: integer
              format: int64
            userAgencyId:
              type: integer
              format: int64
            cardOrderCreatedAt:
              type: string
              format: date-time
            createdAt:
              type: string
              format: date-time
    userWithAgencyQuery:
      allOf:
        - $ref: '#/components/schemas/userWithAgency'
        - type: object
          properties:
            createdAtFrom:
              type: string
              format: date-time
            createdAtTo:
              type: string
              format: date-time
            updatedAtFrom:
              type: string
              format: date-time
            updatedAtTo:
              type: string
              format: date-time
            orderByColumn:
              type: string
            orderByDirection:
              type: integer
              description: '1:asc 2:desc'
            strategy:
              type: integer
              description: '1:newest 2:oldest 3:newest active 4:oldest active'
    userWithAgencyGetRequest:
      $ref: '#/components/schemas/userWithAgencyQuery'
    userWithAgencyGetResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              type: array
              items:
                allOf:
                  - $ref: '#/components/schemas/userWithAgency'
                  - type: object
                    properties:
                      password:
                        type: Filtered
    userWithAgencyPageRequest:
      allOf:
        - $ref: '#/components/schemas/userWithAgencyQuery'
        - type: object
          properties:
            pageCurrent:
              type: integer
            pageSize:
              type: integer
    userWithAgencyPageResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              type: object
              properties:
                total:
                  type: integer
                  format: int64
                size:
                  type: integer
                  format: int64
                current:
                  type: integer
                  format: int64
                pages:
                  type: integer
                  format: int64
                records:
                  type: array
                  items:
                    $ref: '#/components/schemas/userWithAgencyFiltered'
    systemUser:
      type: object
      title: systemUser
      properties:
        id:
          type: integer
          format: int64
          x-field-extra-annotation: '@com.baomidou.mybatisplus.annotation.TableId(type = com.baomidou.mybatisplus.annotation.IdType.AUTO)'
        password:
          type: string
          format: password
        username:
          type: string
        status:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: integer
          format: int64
        updatedByUsername:
          type: string
    systemUserQuery:
      allOf:
        - $ref: '#/components/schemas/systemUser'
        - type: object
          properties:
            createdAtFrom:
              type: string
              format: date-time
            createdAtTo:
              type: string
              format: date-time
            updatedAtFrom:
              type: string
              format: date-time
            updatedAtTo:
              type: string
              format: date-time
    systemUserInfoGetRequest:
      type: object
      title: systemUserInfoGetRequest
      properties:
        id:
          type: integer
          format: int64
    systemUserInfoGetResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              allOf:
                - $ref: '#/components/schemas/systemUser'
                - type: object
                  properties:
                    password:
                      type: Filtered
    systemUserGetRequest:
      $ref: '#/components/schemas/systemUserQuery'
    systemUserGetResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/systemUser'
    systemUserAddRequest:
      $ref: '#/components/schemas/systemUser'
    systemUserAddResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/id'
    systemUserResetPasswordRequest:
      type: object
      title: systemUserResetPasswordRequest
      properties:
        oldPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
        confirmNewPassword:
          type: string
          format: password
    systemUserResetPasswordResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
