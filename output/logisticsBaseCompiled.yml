openapi: 3.0.3
info:
  title: logistics base
  description: This is my API
  version: 1.0.0
paths:
  /deliveryFeeGet:
    post:
      operationId: /deliveryFee/get
      description: 取得運費
      tags:
        - deliveryFee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/deliveryFeeGetRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/deliveryFeeGetResponse'
components:
  schemas:
    id:
      type: object
      properties:
        id:
          type: integer
          format: int64
    result:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        requestId:
          type: string
        success:
          type: boolean
    phoneNumber:
      type: object
      title: phoneNumber
      properties:
        countryCode:
          type: integer
          format: int32
        nationalPhoneNumber:
          type: string
    shippingVendor:
      type: object
      properties:
        id:
          type: integer
          format: int64
          x-field-extra-annotation: '@com.baomidou.mybatisplus.annotation.TableId(type = com.baomidou.mybatisplus.annotation.IdType.AUTO)'
        name:
          type: string
        remark:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    shippingVendorGetRequest:
      $ref: '#/components/schemas/shippingVendor'
    shippingVendorGetResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/shippingVendor'
    deliveryFeeGetRequest:
      type: object
      properties:
        cryptoCurrency:
          type: string
        agencyPlanId:
          type: integer
          format: int64
        shippingNationCode:
          type: string
          description: '國籍編碼(ISO 3166-1) 中國:CHN 新加坡:SGP 台灣:TWN'
        shippingPostalCode:
          type: string
        shippingAddress:
          type: string
    deliveryFeeGetResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              type: object
              properties:
                deliveryFee:
                  type: number
    shipment:
      type: object
      properties:
        id:
          type: integer
          format: int64
          x-field-extra-annotation: '@com.baomidou.mybatisplus.annotation.TableId(type = com.baomidou.mybatisplus.annotation.IdType.AUTO)'
        shipmentOrderNumber:
          type: string
        shippingVendorId:
          type: integer
          format: int64
        shippingVendorName:
          type: string
        cardOrderId:
          type: integer
          format: int64
        shippingStatus:
          type: integer
          description: '貨運狀態 1:不需出貨 2:等待貨運 3:建立貨運中 4:已出貨 5:創建貨運失敗 6:出貨失敗 7:已到貨'
        shippedBy:
          type: integer
          format: int64
          description: 負責出貨的管理員id
        shippedByName:
          type: string
          description: 負責出貨的管理員名稱
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        shippedAt:
          type: string
          format: date-time
        deliveredAt:
          type: string
          format: date-time
    shipmentQuery:
      allOf:
        - $ref: '#/components/schemas/shipment'
        - type: object
          properties:
            createdAtFrom:
              type: string
              format: date-time
            createdAtTo:
              type: string
              format: date-time
            updatedAtFrom:
              type: string
              format: date-time
            updatedAtTo:
              type: string
              format: date-time
    shipmentAddRequest:
      $ref: '#/components/schemas/shipment'
    shipmentAddResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/id'
    shipmentGetRequest:
      $ref: '#/components/schemas/shipmentQuery'
    shipmentGetResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/shipment'
    shipmentUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/shipment'
        - type: object
          properties:
            query:
              $ref: '#/components/schemas/shipmentQuery'
    shipmentUpdateResponse:
      allOf:
        - $ref: '#/components/schemas/result'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/shipment'

