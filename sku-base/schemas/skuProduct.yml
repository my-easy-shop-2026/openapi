---
skuProduct:
  type: object
  properties:
    id:
      type: integer
      format: int64
      x-field-extra-annotation: '@com.baomidou.mybatisplus.annotation.TableId(type = com.baomidou.mybatisplus.annotation.IdType.AUTO)'
    name:
      type: string
    storeId:
      type: integer
      format: int64
    storeName:
      type: string
    quantity:
      type: integer
    price:
      type: number
    currency:
      type: string
    status:
      type: integer
      description: 1:activated 2:deactivated
    productDescriptionId:
      type: integer
      format: int64
    remark:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time