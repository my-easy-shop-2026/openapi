  properties:
    id:
      type: integer
      format: int64
      x-field-extra-annotation: '@com.baomidou.mybatisplus.annotation.TableId(type = com.baomidou.mybatisplus.annotation.IdType.AUTO)'
    notifyType:
      type: integer
    receiver:
      type: string
    subject:
      type: string
    content:
      type: string
    templateId:
      type: integer
    templateParameter:
      type: string
    status:
      type: integer
    count:
      type: integer
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time