---
sendRecord:
  type: object
  properties:
    id:
      type: integer
      format: int64
      x-field-extra-annotation: '@com.baomidou.mybatisplus.annotation.TableId(type = com.baomidou.mybatisplus.annotation.IdType.AUTO)'
    messageId:
      type: integer
      format: int64
    passagewayId:
      type: integer
      format: int64
    status:
      type: integer
    responseCode:
      type: integer
    responseContent:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time